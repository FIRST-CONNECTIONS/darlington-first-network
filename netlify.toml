# Netlify config for Darlington First
# Place this file at the root of your site repo (alongside index.html)

[build]
  functions = "netlify/functions"
  publish = "."

# Clean function URLs — so /.netlify/functions/subscribe becomes /api/subscribe
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# Optional: explicit function settings
[functions]
  node_bundler = "esbuild"
